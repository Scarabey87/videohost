{% extends "base.html" %}

{% block title %}Редактирование профиля - {{ site_name }}{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <h1 class="page-title" style="text-align: center;">Редактирование профиля</h1>
    
    <form method="POST" enctype="multipart/form-data" style="margin-top: 32px;">
        <div class="form-group">
            <label for="avatar" class="form-label">Аватар</label>
            <input type="file" id="avatar" name="avatar" class="form-control" accept="image/*">
        </div>
        
        <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" name="email" class="form-control" value="{{ current_user.email }}">
        </div>
        
        <div class="form-group">
            <label for="bio" class="form-label">О себе</label>
            <textarea id="bio" name="bio" class="form-control" rows="4" placeholder="Расскажите о себе...">{{ current_user.bio }}</textarea>
        </div>
        
        <hr style="border: none; border-top: 1px solid var(--border); margin: 32px 0;">
        
        <h3 style="margin-bottom: 16px;">Смена пароля</h3>
        
        <div class="form-group">
            <label for="new_password" class="form-label">Новый пароль</label>
            <input type="password" id="new_password" name="new_password" class="form-control" placeholder="Минимум 8 символов">
        </div>
        
        <div class="form-group">
            <label for="confirm_password" class="form-label">Подтверждение пароля</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Повторите новый пароль">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 16px; margin-top: 24px;">Сохранить изменения</button>
    </form>
    
    <a href="{{ url_for('profile') }}" class="btn btn-secondary" style="display: block; text-align: center; margin-top: 16px;">Отмена</a>
</div>
{% endblock %}
