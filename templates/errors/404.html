{% extends "base.html" %}
{% block title %}404 - Страница не найдена{% endblock %}
{% block content %}
<div style="text-align: center; padding: 80px 0;">
    <h1 style="font-size: 72px; color: var(--accent);">404</h1>
    <p class="page-title">Страница не найдена</p>
    <p style="color: var(--text-secondary); margin-bottom: 32px;">Запрошенная страница не существует или была перемещена.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">На главную</a>
</div>
{% endblock %}
